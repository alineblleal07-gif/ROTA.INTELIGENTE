<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rota Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

h2{
text-align:center;
margin:10px;
}

/* MAPA */
#mapa{
height:50vh;
width:100%;
}

/* PAINEL */
#painel{
display:flex;
gap:10px;
padding:10px;
background:#151515;
flex-wrap:wrap;
}

input,select,button{
padding:8px;
border-radius:6px;
border:none;
}

button{
background:#00aaff;
color:white;
cursor:pointer;
}

/* FEED */
#feed{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card p{
margin:5px 10px;
font-size:13px;
}
</style>
</head>

<body>

<h2>🗺️ Rota Inteligente</h2>

<!-- MAPA -->
<div id="mapa"></div>

<!-- PAINEL -->
<div id="painel">

<input type="file" id="arquivo">
<input type="text" id="bairro" placeholder="Digite o bairro">

<select id="nivel">
<option value="normal">Normal</option>
<option value="alerta">Alerta</option>
<option value="critico">Crítico</option>
</select>

<button onclick="publicar()">📸 Publicar</button>

</div>

<!-- FEED -->
<div id="feed"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const mapa = L.map('mapa').setView([-7.351, -35.453], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: 'Rota Inteligente'
}).addTo(mapa);

// 📦 banco local
let posts = JSON.parse(localStorage.getItem("posts")) || [];

// 🚦 risco
function calcular(nivel){
if(nivel === "normal") return "🟢 Baixo";
if(nivel === "alerta") return "🟠 Médio";
return "🔴 Alto";
}

// 📸 publicar
function publicar(){

const arquivo = document.getElementById("arquivo").files[0];
const bairro = document.getElementById("bairro").value;
const nivel = document.getElementById("nivel").value;

if(!arquivo || !bairro){
alert("Preencha tudo");
return;
}

const leitor = new FileReader();

leitor.onload = function(e){

let post = {
img:e.target.result,
bairro,
nivel,
risco:calcular(nivel),
curtidas:0,
data:new Date().toLocaleString(),
lat:-7.351 + (Math.random()*0.05),
lng:-35.453 + (Math.random()*0.05)
};

posts.unshift(post);

localStorage.setItem("posts", JSON.stringify(posts));

render();
};

leitor.readAsDataURL(arquivo);
}

// ❤️ curtir
function curtir(i){
posts[i].curtidas++;
localStorage.setItem("posts", JSON.stringify(posts));
render();
}

// 📍 markers no mapa
function markers(){
posts.forEach(p=>{
L.circleMarker([p.lat,p.lng],{
radius:10,
color:
p.risco.includes("🔴") ? "red" :
p.risco.includes("🟠") ? "orange" : "green"
}).addTo(mapa)
.bindPopup(`
<b>${p.bairro}</b><br>
${p.risco}
`);
});
}

// 📱 render feed
function render(){

document.getElementById("feed").innerHTML="";

markers();

posts.forEach((p,i)=>{
document.getElementById("feed").innerHTML += `
<div class="card">
<img src="${p.img}">
<p>📍 Bairro: ${p.bairro}</p>
<p>🚦 ${p.risco}</p>
<p>🕒 ${p.data}</p>
<p onclick="curtir(${i})">❤️ Curtidas: ${p.curtidas}</p>
</div>
`;
});
}

render();

</script>

</body>
</html>
