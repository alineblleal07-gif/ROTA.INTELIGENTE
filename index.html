<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rota Inteligente Completo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

h2{
text-align:center;
margin:10px;
}

/* MAPA */
#mapa{
height:55vh;
width:100%;
}

/* PAINEL */
#painel{
display:flex;
gap:10px;
padding:10px;
background:#151515;
flex-wrap:wrap;
}

input,select,button{
padding:8px;
border-radius:8px;
border:none;
}

button{
background:#00aaff;
color:white;
cursor:pointer;
}

/* FEED */
#feed{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:12px;
}

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.info{
padding:10px;
font-size:13px;
}

.like{
color:#ff4d6d;
cursor:pointer;
}

.comment{
color:#00d4ff;
cursor:pointer;
margin-left:10px;
}

.commentBox{
margin-top:5px;
font-size:12px;
color:#ccc;
}
</style>
</head>

<body>

<h2>🗺️ Rota Inteligente - :contentReference[oaicite:0]{index=0}</h2>

<div id="mapa"></div>

<div id="painel">
<input type="file" id="file">
<input type="text" id="bairro" placeholder="Digite o bairro">

<select id="nivel">
<option value="normal">🟢 Normal</option>
<option value="alerta">🟡 Alerta</option>
<option value="critico">🔴 Crítico</option>
</select>

<button onclick="postar()">📸 Publicar</button>
</div>

<div id="feed"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌍 MAPA
const mapa = L.map('mapa').setView([-7.351, -35.453], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Rota Inteligente'
}).addTo(mapa);

// 📦 banco local
let posts = JSON.parse(localStorage.getItem("posts")) || [];

// 🚦 risco
function cor(nivel){
if(nivel==="normal") return "green";
if(nivel==="alerta") return "orange";
return "red";
}

// 📸 postar
function postar(){

const file = document.getElementById("file").files[0];
const bairro = document.getElementById("bairro").value;
const nivel = document.getElementById("nivel").value;

if(!file || !bairro) return alert("Preencha tudo");

const reader = new FileReader();

reader.onload = function(e){

let post = {
img:e.target.result,
bairro,
nivel,
likes:0,
comentarios:[],
data:new Date().toLocaleString(),
lat:-7.351 + Math.random()*0.05,
lng:-35.453 + Math.random()*0.05
};

posts.unshift(post);
localStorage.setItem("posts",JSON.stringify(posts));

render();
};

reader.readAsDataURL(file);
}

// ❤️ like
function like(i){
posts[i].likes++;
localStorage.setItem("posts",JSON.stringify(posts));
render();
}

// 💬 comentar
function comentar(i){
let texto = prompt("Digite seu comentário:");
if(texto){
posts[i].comentarios.push(texto);
localStorage.setItem("posts",JSON.stringify(posts));
render();
}
}

// 📍 mapa
function markers(){
posts.forEach(p=>{
L.circleMarker([p.lat,p.lng],{
radius:9,
color:cor(p.nivel)
}).addTo(mapa)
.bindPopup(`📍 ${p.bairro}<br>${p.nivel}`);
});
}

// 📱 render feed
function render(){

document.getElementById("feed").innerHTML="";

markers();

posts.forEach((p,i)=>{

let comentariosHTML = "";
p.comentarios.forEach(c=>{
comentariosHTML += `<div class="commentBox">💬 ${c}</div>`;
});

document.getElementById("feed").innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="info">
📍 ${p.bairro}<br>
🚦 ${p.nivel}<br>
🕒 ${p.data}<br><br>

<span class="like" onclick="like(${i})">❤️ ${p.likes}</span>
<span class="comment" onclick="comentar(${i})">💬 Comentar</span>

${comentariosHTML}
</div>
</div>
`;

});
}

render();

</script>

</body>
</html>
